AllCops:
  NewCops: enable
  # Pin both targets to the gemspec floor (activerecord/activesupport >= 7.2,
  # required_ruby_version >= 3.3). RuboCop-rails otherwise auto-detects
  # TargetRailsVersion from a Gemfile.lock, which is gitignored and absent in CI's
  # rubocop job (it runs under an appraisal BUNDLE_GEMFILE, no root lock). Detection
  # then silently falls back to Rails 5.0, where `Rails.env.local?` (7.1+) trips
  # Rails/UnknownEnv. Pinning makes linting deterministic across local and CI.
  TargetRubyVersion: 3.3
  TargetRailsVersion: 7.2
  Exclude:
    - vendor/bundle/**/*
    - gemfiles/**/*.gemfile
    - spec/dummy_engine/**/*
    - gemfiles/vendor/**/*
    - spec/dummy_engine/dummy_engine.gemspec
    - spec/schemas/**/*.rb

plugins:
  - rubocop-rails
  - rubocop-performance
  - rubocop-thread_safety
  - rubocop-rake
  - rubocop-rspec

# Apartment's own shipped cops. require uses a repo-relative path because the
# gem's lib is not on RuboCop's load path when linting in-repo; downstream apps
# use `require: rubocop/apartment` (the installed gem's lib is on the load path).
require:
  - ./lib/rubocop/apartment

inherit_from:
  - config/default.yml

Apartment/NoDirectCurrentWrite:
  Exclude:
    - lib/apartment/**/*
    - spec/**/*

Apartment/PreferBlockSwitch:
  Exclude:
    - lib/apartment/**/*
    - spec/**/*

Gemspec/RequiredRubyVersion:
  Exclude:
    - 'ros-apartment.gemspec'

Layout/MultilineMethodCallIndentation:
  EnforcedStyle: indented

Metrics/BlockLength:
  Max: 30
  Exclude:
    - spec/**/*.rb
    - lib/tasks/**/*.rake
    - lib/apartment/tasks/**/*.rake
    - Rakefile

Metrics/MethodLength:
  Max: 15
  Exclude:
    - spec/**/*.rb
    - lib/apartment.rb
    - lib/apartment/tenant.rb
    - lib/apartment/config.rb
    - lib/apartment/pool_reaper.rb

Metrics/ModuleLength:
  Max: 150
  Exclude:
    - spec/**/*.rb

Metrics/CyclomaticComplexity:
  Exclude:
    - lib/apartment.rb
    - lib/apartment/config.rb
    - lib/apartment/pool_reaper.rb

Metrics/PerceivedComplexity:
  Exclude:
    - lib/apartment/config.rb

Metrics/ParameterLists:
  Exclude:
    - lib/apartment/pool_reaper.rb

Metrics/AbcSize:
  Max: 20
  Exclude:
    - spec/**/*.rb

Rails/SkipsModelValidations:
  Exclude:
    - lib/apartment/pool_manager.rb

Metrics/ClassLength:
  Max: 155
  Exclude:
    - spec/**/*.rb

Rails/Delegate:
  Exclude:
    - lib/apartment/tenant.rb

Rails/RakeEnvironment:
  Enabled: false

Rails/ApplicationRecord:
  Enabled: false

Rails/Output:
  Enabled: false

Lint/EmptyBlock:
  Exclude:
    - spec/**/*.rb
    - lib/apartment/instrumentation.rb

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: single_quotes

Style/InlineComment:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true
  Exclude:
    - Gemfile

Style/MethodCallWithArgsParentheses:
  Enabled: true
  EnforcedStyle: require_parentheses
  AllowedPatterns:
    - 'puts'
    - 'info'
    - 'warn'
    - 'debug'
    - 'error'
    - 'fatal'
    - 'fail'

Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: comma

Style/ClassAndModuleChildren:
  EnforcedStyle: nested
  AutoCorrect: true

Style/CollectionMethods:
  PreferredMethods:
    collect: 'map'
    collect!: 'map!'
    inject: 'reduce'
    detect: 'detect'
    find_all: 'select'

# RSpec style preferences - disable for mature test suite
RSpec/NamedSubject:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false

RSpec/MessageSpies:
  Enabled: false

RSpec/NestedGroups:
  Enabled: false

RSpec/ContextWording:
  Enabled: false

RSpec/ExampleLength:
  Enabled: false

RSpec/InstanceVariable:
  Enabled: false

RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/DescribeClass:
  Enabled: false

RSpec/IndexedLet:
  Enabled: false

RSpec/AnyInstance:
  Enabled: false

RSpec/BeforeAfterAll:
  Enabled: false

RSpec/LeakyConstantDeclaration:
  Enabled: false

RSpec/VerifiedDoubles:
  Enabled: false

RSpec/VerifiedDoubleReference:
  Enabled: false

RSpec/StubbedMock:
  Enabled: false

RSpec/MultipleDescribes:
  Enabled: false

RSpec/NoExpectationExample:
  Enabled: false

# ThreadSafety - intentional design for configuration
ThreadSafety/ClassInstanceVariable:
  Exclude:
    - lib/apartment.rb
    - lib/apartment/pool_reaper.rb
    - lib/apartment/elevators/*.rb
    - spec/support/config.rb
    - spec/integration/v4/support/rbac_helper.rb

ThreadSafety/ClassAndModuleAttributes:
  Exclude:
    - lib/apartment.rb

ThreadSafety/DirChdir:
  Exclude:
    - ros-apartment.gemspec

ThreadSafety/NewThread:
  Exclude:
    - spec/tenant_spec.rb
    - spec/unit/**/*.rb

# Rake cops
Rake/DuplicateTask:
  Enabled: false