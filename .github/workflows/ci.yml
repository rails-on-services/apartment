name: CI

on:
  push:
    branches: [development, main]
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    types: [published]

jobs:
  # ── Unit tests (no database required) ──────────────────────────────
  unit:
    name: Unit · Ruby ${{ matrix.ruby }} · Rails ${{ matrix.rails }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.3', '3.4', '4.0']
        rails: ['7.2', '8.0', '8.1']
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_${{ matrix.rails }}_sqlite3.gemfile
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run unit specs
        run: bundle exec rspec spec/unit/ --format progress

  # ── PostgreSQL integration tests ───────────────────────────────────
  postgresql:
    name: PG ${{ matrix.pg }} · Ruby ${{ matrix.ruby }} · Rails ${{ matrix.rails }}
    runs-on: ubuntu-latest
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.3', '3.4', '4.0']
        rails: ['7.2', '8.0', '8.1']
        pg: ['16', '18']
        exclude:
          # Reduce matrix: test oldest PG with oldest Rails, newest with newest
          - pg: '16'
            rails: '8.1'
          - pg: '18'
            rails: '7.2'
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_${{ matrix.rails }}_postgresql.gemfile
      CI: true
      DATABASE_ENGINE: postgresql
    services:
      postgres:
        image: postgres:${{ matrix.pg }}-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: apartment_postgresql_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Configure database
        run: bundle exec rake db:load_credentials
      - name: Database setup
        run: bundle exec rake db:test:prepare
      - name: Run tests
        run: bundle exec rspec --format progress

  # ── MySQL integration tests ────────────────────────────────────────
  mysql:
    name: MySQL 8.4 · Ruby ${{ matrix.ruby }} · Rails ${{ matrix.rails }}
    runs-on: ubuntu-latest
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.3', '3.4', '4.0']
        rails: ['7.2', '8.0', '8.1']
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_${{ matrix.rails }}_mysql2.gemfile
      CI: true
      DATABASE_ENGINE: mysql
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: apartment_mysql_test
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Configure database
        run: bundle exec rake db:load_credentials
      - name: Database setup
        run: bundle exec rake db:test:prepare
      - name: Run tests
        run: bundle exec rspec --format progress

  # ── SQLite integration tests ───────────────────────────────────────
  sqlite:
    name: SQLite · Ruby ${{ matrix.ruby }} · Rails ${{ matrix.rails }}
    runs-on: ubuntu-latest
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.3', '3.4', '4.0']
        rails: ['7.2', '8.0', '8.1']
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_${{ matrix.rails }}_sqlite3.gemfile
      CI: true
      DATABASE_ENGINE: sqlite
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Configure database
        run: bundle exec rake db:load_credentials
      - name: Database setup
        run: bundle exec rake db:test:prepare
      - name: Run tests
        run: bundle exec rspec --format progress
