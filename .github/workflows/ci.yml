name: CI

on:
  push:
    branches: [development, main]
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ruby:
        description: 'Ruby version (all, 3.3, 3.4, 4.0)'
        required: false
        default: 'all'
        type: choice
        options: ['all', '3.3', '3.4', '4.0']
      rails:
        description: 'Rails version (all, 7.2, 8.0, 8.1)'
        required: false
        default: 'all'
        type: choice
        options: ['all', '7.2', '8.0', '8.1']
      engine:
        description: 'Database engine (all, postgresql, mysql, sqlite)'
        required: false
        default: 'all'
        type: choice
        options: ['all', 'postgresql', 'mysql', 'sqlite']

jobs:
  # ── Unit tests (no database required) ──────────────────────────────
  unit:
    name: Unit · Ruby ${{ matrix.ruby }} · Rails ${{ matrix.rails }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ${{ github.event_name == 'workflow_dispatch' && inputs.ruby != 'all' && fromJSON(format('["{0}"]', inputs.ruby)) || fromJSON('["3.3","3.4","4.0"]') }}
        rails: ${{ github.event_name == 'workflow_dispatch' && inputs.rails != 'all' && fromJSON(format('["{0}"]', inputs.rails)) || fromJSON('["7.2","8.0","8.1"]') }}
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_${{ matrix.rails }}_sqlite3.gemfile
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run unit specs
        run: bundle exec rspec spec/unit/ --format progress

  # ── PostgreSQL integration tests ───────────────────────────────────
  postgresql:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.engine == 'all' || inputs.engine == 'postgresql' }}
    name: PG ${{ matrix.pg }} · Ruby ${{ matrix.ruby }} · Rails ${{ matrix.rails }}
    runs-on: ubuntu-latest
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        ruby: ${{ github.event_name == 'workflow_dispatch' && inputs.ruby != 'all' && fromJSON(format('["{0}"]', inputs.ruby)) || fromJSON('["3.3","3.4","4.0"]') }}
        rails: ${{ github.event_name == 'workflow_dispatch' && inputs.rails != 'all' && fromJSON(format('["{0}"]', inputs.rails)) || fromJSON('["7.2","8.0","8.1"]') }}
        pg: ['16', '18']
        exclude:
          # Reduce matrix: test oldest PG with oldest Rails, newest with newest
          - pg: '16'
            rails: '8.1'
          - pg: '18'
            rails: '7.2'
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_${{ matrix.rails }}_postgresql.gemfile
      CI: true
      RAILS_ENV: test
      DATABASE_ENGINE: postgresql
    services:
      postgres:
        image: postgres:${{ matrix.pg }}-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: apartment_postgresql_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Provision RBAC test roles
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres --set ON_ERROR_STOP=on <<'SQL'
            DO $$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'apt_test_db_manager') THEN
                CREATE ROLE apt_test_db_manager LOGIN CREATEDB;
              END IF;
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'apt_test_app_user') THEN
                CREATE ROLE apt_test_app_user LOGIN;
              END IF;
            END $$;
            GRANT apt_test_app_user TO apt_test_db_manager;
          SQL
      - name: Run v4 integration tests
        run: bundle exec rspec spec/integration/v4/ --format progress
        env:
          DATABASE_ENGINE: postgresql
          PGHOST: 127.0.0.1
          PGPORT: '5432'
          PGUSER: postgres
          PGPASSWORD: postgres

  # ── MySQL integration tests ────────────────────────────────────────
  mysql:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.engine == 'all' || inputs.engine == 'mysql' }}
    name: MySQL 8.4 · Ruby ${{ matrix.ruby }} · Rails ${{ matrix.rails }}
    runs-on: ubuntu-latest
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        ruby: ${{ github.event_name == 'workflow_dispatch' && inputs.ruby != 'all' && fromJSON(format('["{0}"]', inputs.ruby)) || fromJSON('["3.3","3.4","4.0"]') }}
        rails: ${{ github.event_name == 'workflow_dispatch' && inputs.rails != 'all' && fromJSON(format('["{0}"]', inputs.rails)) || fromJSON('["7.2","8.0","8.1"]') }}
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_${{ matrix.rails }}_mysql2.gemfile
      CI: true
      RAILS_ENV: test
      DATABASE_ENGINE: mysql
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: apartment_mysql_test
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Provision RBAC test roles
        shell: bash
        run: |
          set -euo pipefail
          mysql -h 127.0.0.1 -u root <<'SQL'
            CREATE USER IF NOT EXISTS 'apt_test_db_manager'@'%';
            CREATE USER IF NOT EXISTS 'apt_test_app_user'@'%';
            GRANT ALL PRIVILEGES ON *.* TO 'apt_test_db_manager'@'%' WITH GRANT OPTION;
            GRANT SELECT, INSERT, UPDATE, DELETE ON `apartment\_%`.* TO 'apt_test_app_user'@'%';
            FLUSH PRIVILEGES;
          SQL
      - name: Run v4 integration tests
        run: bundle exec rspec spec/integration/v4/ --format progress
        env:
          DATABASE_ENGINE: mysql
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: '3306'
          MYSQL_USER: root

  # ── SQLite integration tests ───────────────────────────────────────
  sqlite:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.engine == 'all' || inputs.engine == 'sqlite' }}
    name: SQLite · Ruby ${{ matrix.ruby }} · Rails ${{ matrix.rails }}
    runs-on: ubuntu-latest
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        ruby: ${{ github.event_name == 'workflow_dispatch' && inputs.ruby != 'all' && fromJSON(format('["{0}"]', inputs.ruby)) || fromJSON('["3.3","3.4","4.0"]') }}
        rails: ${{ github.event_name == 'workflow_dispatch' && inputs.rails != 'all' && fromJSON(format('["{0}"]', inputs.rails)) || fromJSON('["7.2","8.0","8.1"]') }}
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_${{ matrix.rails }}_sqlite3.gemfile
      CI: true
      RAILS_ENV: test
      DATABASE_ENGINE: sqlite
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run v4 integration tests
        run: bundle exec rspec spec/integration/v4/ --format progress
        env:
          DATABASE_ENGINE: sqlite
