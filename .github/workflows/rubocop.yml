name: Rubocop
on:
  push:
    branches: [main, '*-stable']
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  rubocop:
    name: Rubocop
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_8.1_sqlite3.gemfile
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true
      - name: Rubocop
        run: bundle exec rubocop